<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تنبيهات السوشيال المفتوح</title>
<style>
  body {
    font-family: "Segoe UI", Tahoma, sans-serif;
    margin: 0;
    padding: 0;
    background: #fefefe;
    color: #111;
    line-height: 1.5;
  }
  header {
    background: #222;
    color: #fff;
    padding: 1rem;
    text-align: center;
  }
  header a { color: #0af; text-decoration: none; margin: 0 0.5rem; }
  main { padding: 1rem; max-width: 800px; margin: auto; }
  section { margin-bottom: 2rem; }
  h2 { border-bottom: 1px solid #ccc; padding-bottom: 0.3rem; }
  .post {
    border: 1px solid #ddd;
    border-radius: 5px;
    padding: 0.8rem;
    margin: 0.5rem 0;
    background: #fafafa;
  }
  .post a { color: #06c; text-decoration: none; }
  .footer {
    text-align: center;
    padding: 1rem;
    font-size: 0.85rem;
    color: #666;
    border-top: 1px solid #ddd;
    margin-top: 2rem;
  }
  button {
    display: inline-block;
    margin: 1rem 0;
    padding: 0.5rem 1rem;
    border: none;
    background: #06c;
    color: #fff;
    border-radius: 5px;
    cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <h1>تنبيهات السوشيال المفتوح</h1>
  <div>
    <a href="https://youdo.blog" target="_blank">مدونتي</a> |
    <a href="https://mulerun.com/invitation/6GFMGQ38KYJ4" target="_blank">إحالتي</a>
  </div>
  <button onclick="fetchData()">تحديث الآن</button>
</header>

<main>
  <section id="posts-section">
    <h2>المنشورات الحديثة</h2>
    <div id="posts-container">جاري تحميل البيانات...</div>
  </section>
</main>

<div class="footer">
تطوير يونس بن عمارة بواسطة <a href="https://mulerun.com" target="_blank">mulerun.com</a>
</div>

<script>
async function fetchData() {
  const container = document.getElementById("posts-container");
  container.innerHTML = "جاري التحديث...";
  try {
    const res = await fetch("data.json");
    const data = await res.json();
    const posts = data.posts || [];
    if(posts.length === 0){
      container.innerHTML = "لا توجد منشورات جديدة.";
      return;
    }
    container.innerHTML = "";
    posts.forEach(post => {
      const div = document.createElement("div");
      div.className = "post";
      div.innerHTML = `
        <a href="${post.url}" target="_blank">${post.text || "(لا يوجد نص)"}</a>
        <div style="font-size:0.8rem;color:#999;">${post.source} | ${new Date(post.date).toLocaleString("ar-EG")}</div>
      `;
      container.appendChild(div);
    });
  } catch (e) {
    container.innerHTML = "حدث خطأ أثناء تحميل البيانات.";
    console.error(e);
  }
}

// تحميل أولي
fetchData();
</script>

</body>
</html>
